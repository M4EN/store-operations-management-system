{% extends "base.html" %}
{% block title %}{% if mode=='edit' %}Edit Product{% else %}New Product{% endif %}{% endblock %}
{% block content %}
<h1>{% if mode=='edit' %}Edit Product{% else %}New Product{% endif %}</h1>

<form method="post">
  {% if product %}
  <p>
    <label>Product ID</label><br>
    <input name="product_id" value="{{ product[0] }}" readonly>
  </p>
  {% endif %}

  <p>
    <label>Name</label><br>
    <input name="product_name" value="{% if product %}{{ product[1] }}{% endif %}" required>
  </p>

  <p>
    <label>Category</label><br>
    <input name="category" value="{% if product %}{{ product[2] }}{% endif %}" required>
  </p>

  <p>
    <label>Purchase Price Per KG</label><br>
    <input type="number" step="0.01" name="purchase_price_per_kg" value="{% if product %}{{ product[3] }}{% endif %}">
  </p>

  <p>
    <label>Sale Price Per KG</label><br>
    <input type="number" step="0.01" name="sale_price_per_kg" value="{% if product %}{{ product[4] }}{% endif %}">
  </p>

  <button class="btn" type="submit">{% if mode=='edit' %}Save{% else %}Create{% endif %}</button>
</form>
{% endblock %}
